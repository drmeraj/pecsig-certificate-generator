<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>PECSIG Summer Meet 2026 Certificate Generator</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    padding:40px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    color:#43A047;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    background:#43A047;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2E7D32;
}

canvas{
    display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>PECSIG Summer Meet 2026</h1>

<h2>Certificate Generator</h2>

<p>Please enter your full name</p>

<input
type="text"
id="fullname"
placeholder="e.g. Meraj Alam Siddiqui">

<br>

<button onclick="generateCertificate()">
Generate Certificate
</button>

</div>

<canvas id="certificateCanvas"></canvas>

<script>

function generateCertificate(){

    let name =
    document.getElementById("fullname").value.trim();

    if(name===""){
        alert("Please enter your name");
        return;
    }

    let img = new Image();

    img.src = "certificate_template.png";

    img.onload = function(){

        let canvas =
        document.getElementById("certificateCanvas");

        let ctx =
        canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(
            img,
            0,
            0
        );

        ctx.fillStyle = "#0A1A66";

        ctx.font =
        "bold 72px Arial";

        ctx.textAlign =
        "center";

        ctx.fillText(
            name.toUpperCase(),
            canvas.width/2,
            canvas.height*0.50
        );

        let link =
        document.createElement("a");

        link.download =
        name.replaceAll(" ","_")
        + "_PECSIG_Certificate.png";

        link.href =
        canvas.toDataURL();

        link.click();
    };
}

</script>

</body>

</html>
