<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PECSIG Summer Meet 2026 Certificate Generator</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#f5f7fa;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h1{
    color:#43A047;
    margin-bottom:10px;
}

h2{
    margin-bottom:30px;
}

p{
    font-size:18px;
}

input{
    width:90%;
    padding:14px;
    font-size:18px;
    border:1px solid #cccccc;
    border-radius:6px;
}

button{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:6px;
    background:#43A047;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2E7D32;
}

canvas{
    display:none;
}

</style>

</head>

<body>

<div class="container">

    <h1>PECSIG Summer Meet 2026</h1>

    <h2>Certificate Generator</h2>

    <p>Please enter your full name</p>

    <input
        type="text"
        id="fullname"
        placeholder="e.g. Meraj Alam Siddiqui">

    <br>

    <button onclick="generateCertificate()">
        Generate Certificate
    </button>

</div>

<canvas id="certificateCanvas"></canvas>

<script>

function generateCertificate() {

    const name =
    document.getElementById("fullname").value.trim();

    if(name === ""){
        alert("Please enter your full name.");
        return;
    }

    const img = new Image();

    img.src = "certificate_template.png";

    img.onload = function(){

        const canvas =
        document.getElementById("certificateCanvas");

        const ctx =
        canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        // NAME SETTINGS
        ctx.fillStyle = "#0A1A66";
ctx.font = "bold 60px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.fillText(
    name.toUpperCase(),
    canvas.width / 2,
    328
);

        // DOWNLOAD

        const link =
        document.createElement("a");

        link.download =
        name.replaceAll(" ","_") +
        "_PECSIG_Certificate.png";

        link.href =
        canvas.toDataURL("image/png");

        link.click();
    };

    img.onerror = function(){
        alert("certificate_template.png not found.");
    };
}

</script>

</body>

</html>
